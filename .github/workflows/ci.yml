name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9.7
        env:
          MYSQL_DATABASE: personal_blog
          MYSQL_USER: blog
          MYSQL_PASSWORD: blog_ci_password
          MYSQL_ROOT_PASSWORD: root_ci_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uroot -proot_ci_password --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:8.8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_DATABASE: personal_blog
      MYSQL_USERNAME: blog
      MYSQL_PASSWORD: blog_ci_password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_USERNAME: default
      REDIS_PASSWORD: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: backend/pom.xml
      - name: Verify backend
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress verify

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build applications
        run: npm run build

  compose:
    name: Container build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose file
        run: docker compose config --quiet
      - name: Build application images
        run: docker compose build

