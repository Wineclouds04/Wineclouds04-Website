name: ${COMPOSE_PROJECT_NAME:-personal-blog}

services:
  mysql:
    image: mysql:9.7
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-personal_blog}
      MYSQL_USER: ${MYSQL_USERNAME:-blog}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-blog_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-blog_root_password}
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    volumes:
      - mysql-data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - data

  redis:
    image: redis:8.8-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-blog_redis_password}
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-personal_blog}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-blog}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-blog_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ${REDIS_USERNAME:-default}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-blog_redis_password}
      JWT_SECRET: ${JWT_SECRET:-local-development-jwt-secret-change-before-production-2026}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      ADMIN_ALLOWED_ORIGINS: ${ADMIN_ALLOWED_ORIGINS:-http://localhost,http://admin.localhost}
      ADMIN_INITIAL_USERNAME: ${ADMIN_INITIAL_USERNAME:-}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-}
      ADMIN_INITIAL_NICKNAME: ${ADMIN_INITIAL_NICKNAME:-Administrator}
      OSS_REGION: ${OSS_REGION:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_CDN_DOMAIN: ${OSS_CDN_DOMAIN:-}
      OSS_OBJECT_PREFIX: ${OSS_OBJECT_PREFIX:-blog/dev}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - app
      - data

  web:
    build:
      context: .
      dockerfile: frontend/web/Dockerfile
    restart: unless-stopped
    environment:
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      NUXT_PUBLIC_API_BASE: /api/v1
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/health | grep ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - app

  admin-static:
    build:
      context: .
      dockerfile: frontend/admin/Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep ok"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - app

  nginx:
    image: nginx:1.28-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
      admin-static:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep ok"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - app

networks:
  app:
  data:
    internal: true

volumes:
  mysql-data:
  redis-data:
