spring:
  application:
    name: personal-blog-api
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:personal_blog}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${MYSQL_USERNAME:blog}
    password: ${MYSQL_PASSWORD:blog_dev_password}
    hikari:
      pool-name: BlogHikariPool
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 3000
      validation-timeout: 1000
      idle-timeout: 600000
      max-lifetime: 1500000
      keepalive-time: 300000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:blog_redis_password}
      connect-timeout: 2s
      timeout: 2s
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  mvc:
    problemdetails:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS:false}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /docs
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
    persist-authorization: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    mail:
      enabled: ${MAIL_ENABLED:false}
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    stage: production-ready

blog:
  runtime:
    project: ${BLOG_PROJECT:blog}
    environment: ${BLOG_ENVIRONMENT:dev}
    cache-enabled: ${CACHE_ENABLED:true}
    article-cache-ttl: ${ARTICLE_CACHE_TTL:10m}
    list-cache-ttl: ${LIST_CACHE_TTL:5m}
    taxonomy-cache-ttl: ${TAXONOMY_CACHE_TTL:30m}
  statistics:
    flush-interval: ${STATISTICS_FLUSH_INTERVAL:60000}
  auth:
    issuer: personal-blog
    audience: personal-blog-admin
    jwt-secret: ${JWT_SECRET:local-development-jwt-secret-change-before-production-2026}
    access-ttl: ${ACCESS_TOKEN_TTL:15m}
    refresh-ttl: ${REFRESH_TOKEN_TTL:7d}
    secure-cookies: ${SECURE_COOKIES:false}
    allowed-origins: ${ADMIN_ALLOWED_ORIGINS:http://localhost:5173,http://admin.localhost}
    initial-admin:
      username: ${ADMIN_INITIAL_USERNAME:}
      password: ${ADMIN_INITIAL_PASSWORD:}
      nickname: ${ADMIN_INITIAL_NICKNAME:Administrator}
  cos:
    region: ${COS_REGION:}
    bucket: ${COS_BUCKET:}
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    cdn-domain: ${COS_CDN_DOMAIN:}
    object-prefix: ${COS_OBJECT_PREFIX:blog/dev}
    max-image-size: ${COS_MAX_IMAGE_SIZE:10485760}
    max-image-width: ${COS_MAX_IMAGE_WIDTH:12000}
    max-image-height: ${COS_MAX_IMAGE_HEIGHT:12000}
  media-lifecycle:
    orphan-grace-period: ${COS_ORPHAN_GRACE_PERIOD:24h}
    delete-retry-base-delay: ${COS_DELETE_RETRY_BASE_DELAY:1m}
    stale-delete-timeout: ${COS_STALE_DELETE_TIMEOUT:15m}
    cleanup-batch-size: ${COS_CLEANUP_BATCH_SIZE:50}
    cleanup-interval: ${COS_CLEANUP_INTERVAL:300000}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:}
    site-url: ${SITE_URL:http://localhost}
    max-retries: ${MAIL_MAX_RETRIES:5}
    poll-interval: ${MAIL_POLL_INTERVAL:30000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX,UTC} %-5level [%thread] %logger{36} - %msg%n"
