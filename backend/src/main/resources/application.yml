spring:
  application:
    name: personal-blog-api
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:personal_blog}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${MYSQL_USERNAME:blog}
    password: ${MYSQL_PASSWORD:blog_dev_password}
    hikari:
      pool-name: BlogHikariPool
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 3000
      validation-timeout: 1000
      idle-timeout: 600000
      max-lifetime: 1500000
      keepalive-time: 300000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:blog_redis_password}
      connect-timeout: 2s
      timeout: 2s
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  mvc:
    problemdetails:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    stage: authentication-and-content

blog:
  auth:
    issuer: personal-blog
    audience: personal-blog-admin
    jwt-secret: ${JWT_SECRET:local-development-jwt-secret-change-before-production-2026}
    access-ttl: ${ACCESS_TOKEN_TTL:15m}
    refresh-ttl: ${REFRESH_TOKEN_TTL:7d}
    secure-cookies: ${SECURE_COOKIES:false}
    allowed-origins: ${ADMIN_ALLOWED_ORIGINS:http://localhost:5173,http://admin.localhost}
    initial-admin:
      username: ${ADMIN_INITIAL_USERNAME:}
      password: ${ADMIN_INITIAL_PASSWORD:}
      nickname: ${ADMIN_INITIAL_NICKNAME:Administrator}
  oss:
    region: ${OSS_REGION:}
    endpoint: ${OSS_ENDPOINT:}
    bucket: ${OSS_BUCKET:}
    cdn-domain: ${OSS_CDN_DOMAIN:}
    object-prefix: ${OSS_OBJECT_PREFIX:blog/dev}
    max-image-size: ${OSS_MAX_IMAGE_SIZE:10485760}
    max-image-width: ${OSS_MAX_IMAGE_WIDTH:12000}
    max-image-height: ${OSS_MAX_IMAGE_HEIGHT:12000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX,UTC} %-5level [%thread] %logger{36} - %msg%n"
